<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estimate | WebCraft</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..800&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <style>
        /* Sidebar Navigation Styles */
        .side-nav {
            position: fixed;
            top: 40px;
            left: 40px;
            z-index: 1000;
        }

        .nav-toggle {
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .nav-toggle span {
            display: block;
            width: 20px;
            height: 1px;
            background: #111;
            margin: 3px 0;
            transition: 0.3s;
        }

        .nav-links {
            list-style: none;
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #eee;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            backdrop-filter: blur(10px);
            opacity: 0;
            visibility: hidden;
            transform: translateX(-20px);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .side-nav.active .nav-links {
            opacity: 1;
            visibility: visible;
            transform: translateX(0);
        }

        .side-nav.active .nav-toggle span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .side-nav.active .nav-toggle span:nth-child(2) { opacity: 0; }
        .side-nav.active .nav-toggle span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        .nav-links li {
            margin-bottom: 15px;
        }

        .nav-links li:last-child {
            margin-bottom: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: #666;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: color 0.3s;
            font-family: 'Zen Kaku Gothic New', sans-serif;
        }

        .nav-links a:hover {
            color: #111;
        }

        @media (max-width: 1000px) {
            .side-nav {
                top: 20px;
                left: 20px;
            }
        }

        /* Reusing some specific styles for the estimate page */
        body {
            padding: 40px 20px;
        }
        .main-content {
            max-width: 900px;
        }
        /* Order Form Styles */
        .order-form {
            text-align: left;
            width: 100%;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .form-group input[type="text"],
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #eee;
            border-radius: 8px;
            font-family: 'Zen Kaku Gothic New', sans-serif;
            font-size: 1rem;
        }

        .calc-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #fdfdfd;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #f5f5f5;
        }

        .calc-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: 400 !important;
        }

        .calc-item input {
            width: 18px;
            height: 18px;
            accent-color: #111;
        }

        .estimation-result {
            background: #fafafa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .est-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #666;
        }

        .est-row.total {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            color: #111;
            font-weight: 500;
            font-size: 1.1rem;
            letter-spacing: 0.03em;
        }

        .est-note {
            font-size: 0.75rem;
            color: #999;
            margin-top: 10px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <nav class="side-nav">
        <div class="nav-toggle" id="navToggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html#concept">Concept</a></li>
            <li><a href="index.html#menu">Menu</a></li>
            <li><a href="index.html#colors">Colors</a></li>
            <li><a href="index.html#delivery">Delivery</a></li>
            <li><a href="index.html#flow">Flow</a></li>
            <li><a href="index.html#notes">Notes</a></li>
            <li><a href="estimate.html">Order</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
    <div class="wrapper fade-in">
        <header class="header">
            <div class="logo-container">
                <img src="logo.png" alt="WebCraft Logo" class="site-logo">
            </div>
            <h1 class="site-title">Estimate</h1>
            <p class="subtitle">制作・デザインのご相談</p>
        </header>

        <main class="main-content">
            <div class="section">
                <form id="orderForm" class="order-form">
                    <div class="form-group">
                        <label>お名前</label>
                        <input type="text" placeholder="例：フェレット 太郎" required>
                    </div>

                    <div class="form-group">
                        <label>メールアドレス</label>
                        <input type="email" placeholder="example@webcraft.jp" required style="width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 8px; font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 1rem;">
                    </div>
                    
                    <div class="form-group">
                        <label>制作プラン・オプションの選択</label>
                        <div class="calc-options">
                            <label class="calc-item">
                                <input type="checkbox" data-price="15000" class="option-check">
                                LP制作プラン (+¥15,000)
                            </label>
                            <label class="calc-item">
                                <input type="checkbox" data-price="40000" class="option-check">
                                スタンダードプラン（5P） (+¥40,000)
                            </label>
                            <label class="calc-item">
                                <input type="checkbox" data-price="75000" class="option-check">
                                コーポレートサイト制作 (+¥75,000)
                            </label>
                            <label class="calc-item">
                                <input type="checkbox" data-price="2500" class="option-check">
                                お問い合わせフォーム実装 (+¥2,500)
                            </label>
                            <label class="calc-item">
                                <input type="checkbox" data-price="2500" class="option-check">
                                独自ドメイン・サーバー設定代行 (+¥2,500)
                            </label>
                            <label class="calc-item">
                                <input type="checkbox" data-price="10000" class="option-check">
                                ロゴ制作 (+¥10,000)
                            </label>
                        </div>
                    </div>

                    <div class="estimation-result">
                        <div class="est-row"><span>基本着手金</span><span>¥5,000</span></div>
                        <div class="est-row"><span>プラン・オプション合計</span><span id="optTotal">¥0</span></div>
                        <div class="est-row total"><span>概算合計 (税込)</span><span id="grandTotal">¥5,500</span></div>
                        <p class="est-note">※消費税10%を含んだ概算です。詳細な仕様により金額が変動する場合があります。</p>
                    </div>

                    <div class="form-group">
                        <label>制作内容のご相談・備考</label>
                        <textarea placeholder="サイトの目的や希望するイメージ、参考サイトなどがあればご記入ください" required></textarea>
                    </div>

                    <button type="submit" class="btn-primary" style="width: 100%; margin-top: 20px;">この内容で相談する</button>
                    <a href="index.html" style="display: block; text-align: center; margin-top: 20px; font-size: 0.85rem; color: #999; text-decoration: none;">← ホームに戻る</a>
                </form>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2026 WebCraft.</p>
        </footer>
    </div>

    <script>
        // Estimation Logic
        const optionChecks = document.querySelectorAll('.option-check');
        const optTotalDisp = document.getElementById('optTotal');
        const grandTotalDisp = document.getElementById('grandTotal');
        
        const BASE_FEE = 5000;
        const TAX_RATE = 1.1;

        function calculate() {
            let optTotal = 0;
            optionChecks.forEach(check => {
                if (check.checked) {
                    optTotal += parseInt(check.getAttribute('data-price'));
                }
            });

            const grandTotal = Math.floor((BASE_FEE + optTotal) * TAX_RATE);

            optTotalDisp.textContent = `¥${optTotal.toLocaleString()}`;
            grandTotalDisp.textContent = `¥${grandTotal.toLocaleString()}`;
        }

        optionChecks.forEach(check => {
            check.addEventListener('change', calculate);
        });

        // --- フォーム送信処理 (本番用: Googleスプレッドシート連携) ---
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzH8573DEAutE2ANOqLQ4d4LCcSdbCPlkciENKprfs0jQM_vAXwbz9qM_gwnN8C5DT06A/exec';

        async function sendToGoogleSheet(data) {
            await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8'
                },
                body: JSON.stringify(data)
            });
        }

        // Form Submission Logic
        document.getElementById('orderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerText;
            submitBtn.disabled = true;
            submitBtn.innerText = '送信中...';

            const selectedOptions = Array.from(optionChecks)
                .filter(c => c.checked)
                .map(c => c.parentElement.textContent.trim().split(' (')[0])
                .join(', ');

            const newData = {
                type: 'Order',
                date: new Date().toISOString(),
                name: document.querySelector('input[type="text"]').value,
                email: document.querySelector('input[type="email"]').value,
                message: document.querySelector('textarea').value,
                options: selectedOptions || 'なし',
                total: document.getElementById('grandTotal').textContent,
                source: 'estimate.html'
            };

            try {
                await sendToGoogleSheet(newData);
                alert('お見積もりのご相談を送信しました。内容を確認次第、ご連絡いたします。');
                e.target.reset();
                calculate();
            } catch (error) {
                console.error('Submission error:', error);
                alert('送信に失敗しました。時間をおいて再度お試しください。');
            } finally {
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
            }
        });

        // Navigation Toggle
        const navToggle = document.getElementById('navToggle');
        const sideNav = document.querySelector('.side-nav');
        const navLinks = document.querySelectorAll('.nav-links a');

        navToggle.addEventListener('click', () => {
            sideNav.classList.toggle('active');
        });

        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                sideNav.classList.remove('active');
            });
        });
    </script>
</body>
</html>
