<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | WebCraft</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #f8f9fa;
            padding: 20px;
        }
        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 20px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .admin-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #111;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #111;
            margin-bottom: 5px;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #999;
            text-transform: uppercase;
        }
        .data-table-container {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow-x: auto;
        }
        .table-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th {
            text-align: left;
            padding: 12px;
            color: #999;
            font-weight: 500;
            border-bottom: 2px solid #f5f5f5;
        }
        td {
            padding: 15px 12px;
            border-bottom: 1px solid #f5f5f5;
            vertical-align: top;
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .badge-order { background: #e3f2fd; color: #1976d2; }
        .badge-contact { background: #f1f8e9; color: #388e3c; }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #ccc;
        }
        
        /* Login Screen */
        #loginScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-box {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }
        .login-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #111;
            margin-bottom: 20px;
        }
        .login-input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .login-button {
            width: 100%;
            padding: 12px 15px;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-button:hover {
            background: #333;
        }
        .error-message {
            color: #ff5252;
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <!-- ログイン画面 -->
    <div id="loginScreen">
        <div class="login-box">
            <div class="login-title">管理者ログイン</div>
            <div id="loginError" class="error-message">パスワードが間違っています。</div>
            <input type="password" id="passwordInput" class="login-input" placeholder="パスワードを入力">
            <button onclick="attemptLogin()" class="login-button">ログイン</button>
            <p style="font-size: 0.8rem; color: #999; margin-top: 20px;">
                ※この実装は静的サイト向けの簡易的な保護であり、本格的なセキュリティではありません。
            </p>
        </div>
    </div>

    <!-- 管理画面（初期状態は非表示） -->
    <div class="admin-container fade-in" id="adminScreen" style="display: none;">
        <header class="admin-header">
            <div class="admin-title">WebCraft Admin</div>
            <div>
                <button onclick="clearData()" style="font-size: 0.8rem; color: #ff5252; background: none; border: 1px solid #ff5252; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-right: 10px;">データを全削除</button>
                <button onclick="logout()" style="font-size: 0.8rem; color: #555; background: none; border: 1px solid #ccc; padding: 5px 10px; border-radius: 4px; cursor: pointer;">ログアウト</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">総件数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="orderCount">0</div>
                <div class="stat-label">見積もり・注文</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="contactCount">0</div>
                <div class="stat-label">お問い合わせ</div>
            </div>
        </div>

        <div class="data-table-container">
            <div class="table-title">受信トレイ</div>
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>日時</th>
                        <th>種別</th>
                        <th>お名前</th>
                        <th>メール / 内容</th>
                        <th>金額 (概算)</th>
                    </tr>
                </thead>
                <tbody id="dataBody">
                    <!-- Data will be loaded here -->
                </tbody>
            </table>
            <div id="emptyState" class="empty-state">まだデータがありません</div>
        </div>
    </div>

    <script>
        // ※注意: localStorageはデモ用。本番の問い合わせ管理には使用しない
        function loadData() {
            const data = JSON.parse(localStorage.getItem('webCraftData') || '[]');
            const body = document.getElementById('dataBody');
            const emptyState = document.getElementById('emptyState');
            
            body.innerHTML = '';
            
            if (data.length === 0) {
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                data.sort((a, b) => new Date(b.date) - new Date(a.date));
                
                data.forEach(item => {
                    const tr = document.createElement('tr');
                    const isOrder = item.type === 'Order';
                    tr.innerHTML = `
                        <td style="white-space: nowrap;">${new Date(item.date).toLocaleString()}</td>
                        <td><span class="badge ${isOrder ? 'badge-order' : 'badge-contact'}">${isOrder ? '見積もり' : '問い合わ'}</span></td>
                        <td style="font-weight: 500;">${item.name}</td>
                        <td>
                            <div style="color: #666; margin-bottom: 5px;">${item.email}</div>
                            <div style="font-size: 0.85rem; line-height: 1.6;">${item.message}</div>
                            ${item.options ? `<div style="font-size: 0.75rem; color: #999; margin-top: 5px;">オプション: ${item.options}</div>` : ''}
                        </td>
                        <td style="font-weight: 700;">${item.total || '-'}</td>
                    `;
                    body.appendChild(tr);
                });
            }

            // Stats
            document.getElementById('totalCount').textContent = data.length;
            document.getElementById('orderCount').textContent = data.filter(i => i.type === 'Order').length;
            document.getElementById('contactCount').textContent = data.filter(i => i.type === 'Contact').length;
        }

        function clearData() {
            if(confirm('全てのデータを削除してもよろしいですか？')) {
                localStorage.removeItem('webCraftData');
                loadData();
            }
        }

        // --- 認証機能 ---
        // ※注意: ここで設定するパスワードハッシュは、ソースコード上に公開されるため
        // 本格的なセキュリティ対策にはなりません。簡易的な閲覧制限としてご利用ください。
        
        // 変更箇所: 下記の TARGET_HASH にパスワードのハッシュ値を設定してください。
        // 現在は「miraiya@」のSHA-256ハッシュ値です。
        const TARGET_HASH = "5d40aaee3d6f786e8060a1942a92cc06ae51c1ad59b54f5f8b9dcf10a79264ef";

        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        let refreshInterval;

        function checkAuth() {
            if (sessionStorage.getItem('adminAuth') === 'true') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminScreen').style.display = 'block';
                loadData();
                // 5秒ごとの更新を開始
                if (!refreshInterval) {
                    refreshInterval = setInterval(loadData, 5000);
                }
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('adminScreen').style.display = 'none';
                if (refreshInterval) {
                    clearInterval(refreshInterval);
                    refreshInterval = null;
                }
            }
        }

        async function attemptLogin() {
            const pwd = document.getElementById('passwordInput').value;
            const hash = await sha256(pwd);
            if (hash === TARGET_HASH) {
                sessionStorage.setItem('adminAuth', 'true');
                document.getElementById('loginError').style.display = 'none';
                document.getElementById('passwordInput').value = '';
                checkAuth();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function logout() {
            sessionStorage.removeItem('adminAuth');
            checkAuth();
        }

        // Enterキーでログイン
        const passwordInput = document.getElementById('passwordInput');
        if (passwordInput) {
            passwordInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    attemptLogin();
                }
            });
        }

        // 初期チェック
        checkAuth();
    </script>
</body>
</html>
